services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: remnawave-cabinet-app
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- --header=\"x-healthcheck-token: $$HEALTHCHECK_TOKEN\" http://127.0.0.1:3000/api/health >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
