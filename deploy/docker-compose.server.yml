name: remnawave-cabinet

services:
  db:
    image: postgres:16-alpine
    container_name: remnawave-cabinet-db
    restart: unless-stopped
    env_file:
      - ${CABINET_ENV_FILE:-.env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${CABINET_DB_BIND:-127.0.0.1}:${CABINET_DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cabinet

  check-env:
    image: ${CABINET_IMAGE:-ghcr.io/asdcrosh/cabinet_remna:latest}
    pull_policy: ${CABINET_PULL_POLICY:-always}
    container_name: remnawave-cabinet-check-env
    command: ["node", "scripts/check-env.mjs"]
    env_file:
      - ${CABINET_ENV_FILE:-.env}
    restart: "no"
    networks:
      - cabinet

  migrate:
    image: ${CABINET_IMAGE:-ghcr.io/asdcrosh/cabinet_remna:latest}
    pull_policy: ${CABINET_PULL_POLICY:-always}
    container_name: remnawave-cabinet-migrate
    command: ["./node_modules/.bin/prisma", "migrate", "deploy"]
    env_file:
      - ${CABINET_ENV_FILE:-.env}
    depends_on:
      check-env:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: "no"
    networks:
      - cabinet
      - remnawave_external

  seed:
    image: ${CABINET_IMAGE:-ghcr.io/asdcrosh/cabinet_remna:latest}
    pull_policy: ${CABINET_PULL_POLICY:-always}
    container_name: remnawave-cabinet-seed
    command: ["./node_modules/.bin/tsx", "prisma/seed.ts"]
    env_file:
      - ${CABINET_ENV_FILE:-.env}
    depends_on:
      migrate:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: "no"
    networks:
      - cabinet
      - remnawave_external

  app:
    image: ${CABINET_IMAGE:-ghcr.io/asdcrosh/cabinet_remna:latest}
    pull_policy: ${CABINET_PULL_POLICY:-always}
    container_name: remnawave-cabinet-app
    restart: unless-stopped
    env_file:
      - ${CABINET_ENV_FILE:-.env}
    depends_on:
      seed:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "3000"
    ports:
      - "${CABINET_APP_BIND:-127.0.0.1}:${CABINET_APP_PORT:-3000}:3000"
    volumes:
      - "${FULL_BACKUP_DIR:-/opt/remnawave-backups}:/backups:ro"
      - broadcast_uploads:/app/public/uploads
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- --header=\"x-healthcheck-token: $$HEALTHCHECK_TOKEN\" http://127.0.0.1:3000/api/health >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      cabinet:
      remnawave_external:
        aliases:
          - remnawave-cabinet-app

  worker:
    image: ${CABINET_IMAGE:-ghcr.io/asdcrosh/cabinet_remna:latest}
    pull_policy: ${CABINET_PULL_POLICY:-always}
    container_name: remnawave-cabinet-worker
    command: ["./node_modules/.bin/tsx", "scripts/payment-reconciler.ts"]
    restart: unless-stopped
    env_file:
      - ${CABINET_ENV_FILE:-.env}
    depends_on:
      seed:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - cabinet
      - remnawave_external

  caddy:
    image: caddy:2-alpine
    container_name: remnawave-cabinet-caddy
    restart: unless-stopped
    profiles:
      - caddy
    env_file:
      - ${CABINET_ENV_FILE:-.env}
    command:
      - caddy
      - reverse-proxy
      - --from
      - ${APP_URL}
      - --to
      - app:3000
    depends_on:
      app:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - cabinet

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  broadcast_uploads:

networks:
  cabinet:
  remnawave_external:
    name: ${CABINET_EXTERNAL_NETWORK:-remnawave-network}
    external: true
