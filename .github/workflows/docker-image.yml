name: Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker web metadata
        id: meta_web
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Docker ops metadata
        id: meta_ops
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=ops-latest,enable={{is_default_branch}}
            type=ref,event=branch,suffix=-ops
            type=ref,event=tag,suffix=-ops
            type=sha,prefix=ops-sha-

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          target: release
          push: true
          tags: ${{ steps.meta_web.outputs.tags }}
          labels: ${{ steps.meta_web.outputs.labels }}

      - name: Build and push ops
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ops
          push: true
          tags: ${{ steps.meta_ops.outputs.tags }}
          labels: ${{ steps.meta_ops.outputs.labels }}
