name: Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cabinet
          POSTGRES_PASSWORD: cabinet
          POSTGRES_DB: cabinet
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cabinet -d cabinet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      CI: true
      DATABASE_URL: postgresql://cabinet:cabinet@localhost:5432/cabinet?schema=public
      DIRECT_URL: postgresql://cabinet:cabinet@localhost:5432/cabinet?schema=public
      JWT_SECRET: ci-jwt-secret-with-enough-length
      NEXTAUTH_SECRET: ci-nextauth-secret-with-enough-length
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      APP_URL: http://localhost:3000
      ALLOWED_ORIGINS: http://localhost:3000
      YOOKASSA_SHOP_ID: ci-shop
      YOOKASSA_SECRET_KEY: ci-secret
      YOOKASSA_WEBHOOK_ALLOWED_IPS: 127.0.0.1
      REMNAWAVE_BASE_URL: https://remnawave.example
      REMNAWAVE_TOKEN: ci-token
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npx prisma validate
      - name: Check Prisma migration drift
        run: npx prisma migrate diff --from-migrations prisma/migrations --to-schema-datamodel prisma/schema.prisma --shadow-database-url "$DIRECT_URL" --exit-code
      - name: npm audit report
        run: npm audit --audit-level=high
      - run: npm run check:env
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Browser E2E checks
        run: npm run test:e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

  publish:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: release
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
