name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cabinet
          POSTGRES_PASSWORD: cabinet
          POSTGRES_DB: cabinet
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cabinet -d cabinet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      CI: true
      DATABASE_URL: postgresql://cabinet:cabinet@localhost:5432/cabinet?schema=public
      DIRECT_URL: postgresql://cabinet:cabinet@localhost:5432/cabinet?schema=public
      JWT_SECRET: ci-jwt-secret-with-enough-length
      NEXTAUTH_SECRET: ci-nextauth-secret-with-enough-length
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      APP_URL: http://localhost:3000
      ALLOWED_ORIGINS: http://localhost:3000
      YOOKASSA_SHOP_ID: ci-shop
      YOOKASSA_SECRET_KEY: ci-secret
      YOOKASSA_WEBHOOK_ALLOWED_IPS: 127.0.0.1
      REMNAWAVE_BASE_URL: https://remnawave.example
      REMNAWAVE_TOKEN: ci-token
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npx prisma validate
      - name: Check Prisma migration drift
        run: npx prisma migrate diff --from-migrations prisma/migrations --to-schema-datamodel prisma/schema.prisma --shadow-database-url "$DIRECT_URL" --exit-code
      - name: npm audit report
        run: npm audit --audit-level=high
      - run: npm run check:env
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run test:coverage
      - run: npm run build
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Browser E2E checks
        run: npm run test:e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
      - name: Production smoke checks
        run: |
          npm run start &
          server_pid=$!
          trap 'kill $server_pid' EXIT
          npm run test:smoke
